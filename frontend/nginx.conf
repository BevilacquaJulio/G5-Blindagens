server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressao de textos e assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Fallback SPA — necessario para o roteamento client-side (React Router).
    # Sem isso, dar reload numa rota interna retorna 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets versionados pelo Vite (hash no nome)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html nunca cacheado (garante deploy imediato)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
